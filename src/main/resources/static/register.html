<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SplitEase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at bottom right, #111827, #030712);
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-center items-center px-6 py-12">

  <div class="w-full max-w-md space-y-8">
    <!-- Logo -->
    <div class="text-center space-y-2">
      <a href="index.html" class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">SplitEase</a>
      <h2 class="text-xl font-medium text-gray-400">Create your SplitEase account</h2>
    </div>

    <!-- Register Card -->
    <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">
      <form id="registerForm" class="space-y-4">
        <!-- Message box -->
        <div id="alertBox" class="hidden p-4 rounded-2xl text-sm font-semibold"></div>

        <div>
          <label for="name" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
          <input type="text" id="name" required placeholder="Akbar" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition text-gray-100">
        </div>

        <div>
          <label for="email" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
          <input type="email" id="email" required placeholder="akbar@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition text-gray-100">
        </div>

        <div>
          <label for="password" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Password (min 8 chars)</label>
          <input type="password" id="password" required minlength="8" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition text-gray-100">
        </div>

        <div>
          <label for="confirmPassword" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Confirm Password</label>
          <input type="password" id="confirmPassword" required minlength="8" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition text-gray-100">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-green-500 hover:bg-green-600 text-gray-900 font-extrabold py-3.5 rounded-xl transition shadow-lg shadow-green-500/20 text-sm">
          Sign Up
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500">
      Already have an account? <a href="login.html" class="text-green-400 hover:text-green-300 font-semibold transition">Log in</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    const registerForm = document.getElementById('registerForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('hidden');
      alertBox.className = 'hidden p-4 rounded-2xl text-sm font-semibold';
      alertBox.textContent = '';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alertBox.textContent = 'Passwords do not match';
        alertBox.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
        alertBox.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          alertBox.textContent = 'Registration successful! Redirecting to login...';
          alertBox.classList.add('bg-green-500/10', 'border', 'border-green-500/20', 'text-green-400');
          alertBox.classList.remove('hidden');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          let errMsg = data.error || 'Registration failed';
          if (data && typeof data === 'object' && !data.error) {
            errMsg = Object.values(data).join(', ');
          }
          alertBox.textContent = errMsg;
          alertBox.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
          alertBox.classList.remove('hidden');
        }
      } catch (err) {
        alertBox.textContent = 'Network error. Please try again later.';
        alertBox.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
        alertBox.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';
      }
    });
  </script>
</body>
</html>
