<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — SplitEase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at bottom left, #111827, #030712);
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-center items-center px-6">

  <div class="w-full max-w-md space-y-8">
    <!-- Logo -->
    <div class="text-center space-y-2">
      <a href="index.html" class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">SplitEase</a>
      <h2 class="text-xl font-medium text-gray-400">Welcome back! Log in to your account</h2>
    </div>

    <!-- Login Card -->
    <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">
      <form id="loginForm" class="space-y-4">
        <!-- Error alert -->
        <div id="errorAlert" class="hidden p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-semibold"></div>

        <div>
          <label for="email" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition text-gray-100">
        </div>

        <div>
          <label for="password" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Password</label>
          <input type="password" id="password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition text-gray-100">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-green-500 hover:bg-green-600 text-gray-900 font-extrabold py-3.5 rounded-xl transition shadow-lg shadow-green-500/20 text-sm">
          Log In
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500">
      Don't have an account? <a href="register.html" class="text-green-400 hover:text-green-300 font-semibold transition">Sign up now</a>
    </p>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    const loginForm = document.getElementById('loginForm');
    const errorAlert = document.getElementById('errorAlert');
    const submitBtn = document.getElementById('submitBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.classList.add('hidden');
      errorAlert.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('userName', data.name);
          localStorage.setItem('userId', data.userId);
          window.location.href = 'dashboard.html';
        } else {
          // Field validation or authentication errors
          let errMsg = data.error || 'Invalid credentials';
          if (data && typeof data === 'object' && !data.error) {
            errMsg = Object.values(data).join(', ');
          }
          errorAlert.textContent = errMsg;
          errorAlert.classList.remove('hidden');
        }
      } catch (err) {
        errorAlert.textContent = 'Network error. Please try again later.';
        errorAlert.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
